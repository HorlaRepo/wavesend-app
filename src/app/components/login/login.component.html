<div id="top-boss" class="gradient-background">
  <div class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="container py-5">
      <div class="row">
        <div class="col-md-9 col-lg-7 col-xl-5 mx-auto">
          <div class="text-center mb-0">
            <img ngSrc="assets/images/logo-top.png" alt="Logo" height="200" width="250">
          </div>

          <div class="bg-white shadow-md rounded p-3 pt-sm-4 pb-sm-5 px-sm-5">
            <p-toast position="bottom-center"></p-toast>

            <!-- Login Form -->
            <div *ngIf="!twoFactorRequired">
              <h3 class="font-weight-400 text-center mb-4">Sign In</h3>
              <hr class="mx-n5">
              <p class="lead text-center">We are glad to see you again!</p>
              <form id="loginForm" (ngSubmit)="login()">
                <div class="form-group">
                  <label for="emailAddress">Email Address</label>
                  <input [(ngModel)]="username" name="username" type="email" class="form-control" id="emailAddress" required placeholder="Enter Your Email">
                </div>
                <div class="form-group">
                  <label for="loginPassword">Password</label>
                  <input [(ngModel)]="password" name="password" type="password" class="form-control" id="loginPassword" required placeholder="Enter Password">
                </div>
                <div class="row">
                  <div class="col-sm">
                    <div class="form-check custom-control custom-checkbox">
                      <input id="remember-me" name="remember" class="custom-control-input" type="checkbox">
                      <label class="custom-control-label" for="remember-me">Remember Me</label>
                    </div>
                  </div>
                  <div class="col-sm text-right"><a class="btn-link" routerLink="/forgot-password">Forgot Password?</a></div>
                </div>
                <button
                  [disabled]="isLoading"
                  class="btn btn-primary btn-block my-4"
                  type="submit">
                  <span *ngIf="isLoading">
                    <i class="fa fa-spinner fa-spin"></i> Signing in...
                  </span>
                  <span *ngIf="!isLoading">
                    Sign in
                  </span>
                </button>
              </form>
              <p class="text-3 text-center text-muted">Don't have an account? <a class="btn-link" routerLink="/register">Sign Up</a></p>
            </div>

            <!-- 2FA Verification Form -->
            <div *ngIf="twoFactorRequired">
              <h3 class="font-weight-400 text-center mb-4">Two-Factor Authentication</h3>
              <hr class="mx-n5">
              <div class="text-center mb-4">
                <div class="tfa-icon">
                  <i class="fas fa-shield-alt"></i>
                </div>
                <p class="lead text-muted">Enter the 6-digit verification code sent to your email</p>
              </div>
              <form (ngSubmit)="verify2fa()">
                <div class="form-group">
                  <label for="twoFactorCode">Verification Code</label>
                  <input
                    [(ngModel)]="twoFactorCode"
                    name="twoFactorCode"
                    type="text"
                    class="form-control text-center otp-input"
                    id="twoFactorCode"
                    required
                    placeholder="Enter 6-digit code"
                    maxlength="6"
                    autocomplete="one-time-code">
                </div>
                <button
                  [disabled]="isLoading"
                  class="btn btn-primary btn-block my-4"
                  type="submit">
                  <span *ngIf="isLoading">
                    <i class="fa fa-spinner fa-spin"></i> Verifying...
                  </span>
                  <span *ngIf="!isLoading">
                    Verify
                  </span>
                </button>
              </form>
              <div class="text-center">
                <p class="text-3 text-muted mb-2">
                  Didn't receive the code?
                  <a class="btn-link" href="javascript:void(0)" (click)="resendCode()">Resend Code</a>
                </p>
                <p class="text-3 text-muted">
                  <a class="btn-link" href="javascript:void(0)" (click)="backToLogin()">
                    <i class="fas fa-arrow-left"></i> Back to Login
                  </a>
                </p>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
