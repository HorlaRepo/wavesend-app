<div class="gradient-background min-vh-100 d-flex align-items-center justify-content-center py-5">
  <p-toast [life]="10000" position="top-right"></p-toast>

  <div class="container">
    <div class="row">
      <div class="col-md-8 col-lg-6 col-xl-5 mx-auto">
        <div class="text-center mb-4">
          <img ngSrc="assets/images/logo-top.png" alt="Logo" height="200" width="250">
        </div>

        <div class="bg-white shadow-md rounded p-4 p-sm-5">
          <!-- Success Message -->
          <div *ngIf="submitted && isOkay" class="text-center">
            <div class="mb-4">
              <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
            </div>
            <h3 class="font-weight-400 mb-3">Account Activated!</h3>
            <p class="text-muted mb-4">{{message}}</p>
            <button class="btn btn-primary btn-block" (click)="navigateToLogin()">
              Go to Login
            </button>
          </div>

          <!-- Error Message -->
          <div *ngIf="submitted && !isOkay" class="text-center">
            <div class="mb-4">
              <i class="fas fa-times-circle text-danger" style="font-size: 4rem;"></i>
            </div>
            <h3 class="font-weight-400 mb-3">Activation Failed</h3>
            <p class="text-danger mb-4">{{message}}</p>
            <button class="btn btn-primary btn-block mb-2" (click)="submitted = false">
              Try Again
            </button>
            <button class="btn btn-outline-secondary btn-block" (click)="navigateToLogin()">
              Go to Login
            </button>
          </div>

          <!-- Code Entry Form -->
          <div *ngIf="!submitted" class="text-center">
            <h3 class="font-weight-400 mb-3">Activate Your Account</h3>
            <hr class="mx-n4 mb-4">

            <p class="text-muted mb-4">
              A 6-digit activation code has been sent to <strong>{{userEmail}}</strong>
            </p>

            <p class="lead mb-4">Please enter your activation code:</p>

            <div class="d-flex justify-content-center mb-4">
              <code-input
                [isCodeHidden]="false"
                [codeLength]="6"
                [code]="'number'"
                (codeCompleted)="onCodeCompleted($event)">
              </code-input>
            </div>

            <div *ngIf="isLoading" class="text-center my-3">
              <i class="fa fa-spinner fa-spin"></i> Verifying code...
            </div>

            <p class="text-3 text-muted mt-4">
              Didn't receive the code? <a class="btn-link" routerLink="/login">Back to Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
